name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: Smoke-test installed wheel
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/spreadsheet-rescue --help
          python scripts/generate_demo.py ci-demo
          .venv-smoke/bin/spreadsheet-rescue ci-demo/demo_dirty.csv --config ci-demo/demo_config.json --dry-run
